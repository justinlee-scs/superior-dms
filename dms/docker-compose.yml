services:
  caddy:
    image: caddy:2
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - ui
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
      - /home/justinlee/minio/certs:/etc/minio/certs # keep absolute — outside project
    command: minio server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dms_user
      POSTGRES_PASSWORD: psqladminpass
      POSTGRES_DB: dms
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://dms_user:psqladminpass@db:5432/dms
      OBJECT_STORAGE_ENABLED: "true"
      OBJECT_STORAGE_BACKEND: minio
      OBJECT_STORAGE_BUCKET: dms
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      UVICORN_WORKERS: "4"
      CORS_ALLOW_ORIGINS: "http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173"
    ports:
      - "8008:8008"
    depends_on:
      - db
      - minio
    volumes:
      - .:/app:delegated
    command:
      [
        "sh",
        "-c",
        "PYTHONPATH=/app python app/db/init_db.py && PYTHONPATH=/app python scripts/bootstrap_admin.py && PYTHONPATH=/app PYTHONPATH=/app python scripts/seeds_for_rbac.py && uvicorn app.main:app --host 0.0.0.0 --port 8008 --workers ${UVICORN_WORKERS:-4}",
      ]
    restart: unless-stopped

  label-studio:
    image: heartexlabs/label-studio:latest
    user: "1001:0"
    environment:
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/data/media
      - SSRF_PROTECTION_ENABLED=false
      - DISABLE_SIGNUP_WITHOUT_LINK=false
      - LOCAL_FILES_SERVING_ENABLED=true
    ports:
      - "8800:8080"
    volumes:
      - labelstudio_data:/label-studio/data
      - ./output:/data/media # relative path — dms/output
    command: label-studio start
    restart: unless-stopped
    depends_on:
      - db

  image-server:
    image: python:3.12-slim
    working_dir: /images
    command: python -m http.server 8089
    ports:
      - "8089:8089"
    volumes:
      - ./output:/images # relative path — dms/output
    restart: unless-stopped

  ui:
    build:
      context: ../UI
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../UI:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_DEV_API_PROXY_TARGET=http://web:8008
    depends_on:
      - web

volumes:
  minio_data:
  labelstudio_data:
  caddy_data:
  caddy_config:
